server {
    listen 80;
    server_name localhost;

    # Raíz del sitio WordPress
    root /var/www/html;
    index index.php index.html index.htm;

    # Logs (útiles para debuggear en desarrollo)
    access_log /var/log/nginx/tecnimontacargas_access.log;
    error_log  /var/log/nginx/tecnimontacargas_error.log;

    # Tamaño máximo de subida
    # El documento menciona fotos de equipos, logos, galería, PDFs de políticas
    client_max_body_size 64M;

    # ─────────────────────────────────────────
    # WORDPRESS — regla principal
    # Permite URLs amigables (/equipos/toyota-8fgu25)
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ─────────────────────────────────────────
    # PHP — pasar a WordPress
    # ─────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # "wordpress" es el nombre del servicio en docker-compose.yml
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeouts generosos para el admin de WordPress
        fastcgi_read_timeout 300;
    }

    # ─────────────────────────────────────────
    # ARCHIVOS ESTÁTICOS — caché en el navegador
    # CSS, JS, imágenes, fuentes (Work Sans del doc)
    # ─────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ─────────────────────────────────────────
    # SEGURIDAD — bloquear acceso a archivos sensibles
    # ─────────────────────────────────────────

    # Bloquear acceso directo a wp-config.php
    location = /wp-config.php {
        deny all;
    }

    # Bloquear xmlrpc.php (vector de ataques comunes)
    location = /xmlrpc.php {
        deny all;
        access_log off;
        error_log off;
    }

    # Bloquear archivos ocultos (.git, .env, .htaccess)
    location ~ /\. {
        deny all;
        access_log off;
        error_log off;
    }

    # Bloquear acceso a archivos de log y readme
    location ~* \.(log|txt|md)$ {
        deny all;
    }

    # ─────────────────────────────────────────
    # WOOCOMMERCE — rutas de la tienda de repuestos
    # Necesario para /carrito, /checkout, /mi-cuenta
    # ─────────────────────────────────────────
    location ~* ^/wp-json/ {
        try_files $uri $uri/ /index.php?$args;
    }
}

