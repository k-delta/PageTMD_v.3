server {
    listen 80;
    server_name tecnimontacargasdual.com www.tecnimontacargasdual.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://tecnimontacargasdual.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.tecnimontacargasdual.com;
    ssl_certificate     /etc/letsencrypt/live/tecnimontacargasdual.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tecnimontacargasdual.com/privkey.pem;
    return 301 https://tecnimontacargasdual.com$request_uri;
}

server {
    listen 443 ssl;
    server_name tecnimontacargasdual.com;

    ssl_certificate     /etc/letsencrypt/live/tecnimontacargasdual.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tecnimontacargasdual.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://wordpress:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}