# ─────────────────────────────────────────
# Redirigir HTTP → HTTPS
# ─────────────────────────────────────────
server {
    listen 80;
    server_name tecnimontacargas.com www.tecnimontacargas.com;

    # Certbot necesita este bloque para renovar el certificado
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://tecnimontacargas.com$request_uri;
    }
}

# ─────────────────────────────────────────
# Redirigir www → sin www (canónico SEO)
# El doc Épica 12 exige canonical correcto
# ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.tecnimontacargas.com;

    ssl_certificate     /etc/letsencrypt/live/tecnimontacargas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tecnimontacargas.com/privkey.pem;

    return 301 https://tecnimontacargas.com$request_uri;
}

# ─────────────────────────────────────────
# Servidor principal HTTPS
# ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name tecnimontacargas.com;

    root /var/www/html;
    index index.php index.html;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/tecnimontacargas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tecnimontacargas.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logs ──
    access_log /var/log/nginx/tecnimontacargas_access.log;
    error_log  /var/log/nginx/tecnimontacargas_error.log;

    # ── Tamaño subida ──
    # 64MB para fotos de equipos, catálogo, galería
    client_max_body_size 64M;

    # ── Headers de seguridad ──
    # Requerimiento §6.2 del documento
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── WordPress ──
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP ──
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # ── Archivos estáticos ──
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Bloquear wp-admin excepto tu IP ──
    # Requerimiento §6.2 del documento
    # Cambia 190.XXX.XXX.XXX por la IP de tu oficina
    location /wp-admin {
        allow 190.XXX.XXX.XXX;
        deny all;
    }

    # ── Bloquear archivos sensibles ──
    location = /wp-config.php { deny all; }
    location = /xmlrpc.php    { deny all; access_log off; error_log off; }
    location ~ /\.            { deny all; access_log off; error_log off; }
    location ~* \.(log|txt|md)$ { deny all; }

    # ── WooCommerce REST API ──
    location ~* ^/wp-json/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── LiteSpeed Cache / WP Rocket ──
    # Si usas caché en disco, Nginx sirve el HTML directamente
    # sin pasar por PHP (mucho más rápido — Lighthouse >85)
    location / {
        try_files /wp-content/cache/lscache/$host${request_uri}index.html
                  /wp-content/cache/lscache/$host${request_uri}index.html_gzip
                  $uri $uri/ /index.php?$args;
    }
}